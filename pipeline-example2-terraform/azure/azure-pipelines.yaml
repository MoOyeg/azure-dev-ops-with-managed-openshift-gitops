# Starter pipeline

# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml



trigger:
- main

resources:
 repositories:
   - repository: github_repo_devops
     type: github
     endpoint: "Gitops Connection"
     name: MoOyeg/azure-dev-ops-with-managed-openshift-gitops

pool:
  name: AzurePipeline

variables:
  GIT_SHA: $(Build.SourceVersion)
  GIT_BRANCH: $(Build.SourceBranchName)

stages:
  - stage: CI
    displayName: CI Stage
    jobs:
      - job: build
        displayName: build
        steps:
        - task: DockerInstaller@0
          inputs:
            dockerVersion: '17.09.0-ce'
        - task: Docker@2
          displayName: Login to Registry
          inputs:
            containerRegistry: 'container-registry-connection'
            command: 'login'
        - task: Docker@2
          displayName: Build and Push
          inputs:
            containerRegistry: 'container-registry-connection'
            repository: 'github_repo_devops'
            command: 'buildAndPush'
            Dockerfile: '**/Dockerfile'
            tags: $(GIT_SHA)
  - stage: CD
    displayName: Update the Gitops Repo
    jobs:
      - job: deploy
        displayName: Update Gitops Repo
        steps:
        
          - checkout: github_repo_devops
            displayName: Checkout Gitops Repository
            persistCredentials: true
          - task: Bash@3
            displayName: Update image SHA signature
            inputs:
              targetType: inline
              script: |
                 sed -e 's/\(.*tag:\) \(.*\)/\1 $(GIT_SHA)/g' ./helm/app/values.yaml > ./helm/app/values.yaml.temp
                 rm ./helm/app/values.yaml
                 mv ./helm/app/values.yaml.temp ./helm/app/values.yaml
          - task: Bash@3
            displayName: Configure Git
            inputs:
              targetType: inline
              script: |       
                 git config --local user.email "73549783+arunhari82@users.noreply.github.com"
                 git config --local user.name "arunhari82"
                 git add ./helm/app/values.yaml
               
          - task: Bash@3
            displayName: Commit and Push Gitops
            inputs:
              targetType: inline
              script: |    
                 git commit -m 'Updating Git Repo with image SHA : $(GIT_SHA)'
                 git push origin HEAD:main
